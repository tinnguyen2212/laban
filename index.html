<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kỳ Môn Độn Giáp - Luận Giải Chuyên Sâu</title>
    <style>
        /* --- CẤU TRÚC CƠ BẢN --- */
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; background-color: #f4f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; padding-top: 15px; padding-bottom: 30px; box-sizing: border-box;
        }

        /* --- HEADER THÔNG TIN KỲ MÔN --- */
        .qimen-header-info {
            width: 95%; max-width: 500px; display: flex; justify-content: space-between;
            font-size: 13px; font-weight: 600; color: #333; margin-bottom: 10px; padding: 0 5px;
        }
        .header-col { display: flex; flex-direction: column; align-items: center; }
        .header-label { font-size: 11px; font-weight: normal; color: #666; margin-bottom: 2px; }

        /* --- BÀN CỜ KỲ MÔN --- */
        .board-wrapper {
            position: relative; width: 95%; max-width: 500px; aspect-ratio: 1;
            background-color: #ef5323; padding: 22px; border-radius: 8px; box-sizing: border-box; box-shadow: 0 8px 20px rgba(239, 83, 35, 0.2);
        }

        /* Ký hiệu phương hướng */
        .dir-label { position: absolute; color: white; font-weight: 700; font-size: 12px; }
        .dir-dn { top: 4px; left: 8px; }
        .dir-n  { top: 4px; left: 50%; transform: translateX(-50%); }
        .dir-tn { top: 4px; right: 8px; }
        .dir-d  { top: 50%; left: 4px; transform: translateY(-50%); }
        .dir-t  { top: 50%; right: 4px; transform: translateY(-50%); }
        .dir-db { bottom: 4px; left: 8px; }
        .dir-b  { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .dir-tb { bottom: 4px; right: 8px; }

        .qimen-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px;
            width: 100%; height: 100%; background: #ef5323; border: 1px solid #ef5323; box-sizing: border-box;
        }

        .qimen-cell {
            background: #fff; display: flex; flex-direction: column; justify-content: space-between;
            padding: 8px 6px; position: relative; box-sizing: border-box;
        }

        .row-top, .row-bot { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
        .row-mid { display: flex; justify-content: center; align-items: center; flex: 1; }
        
        .c-can { font-size: 15px; font-weight: 800; width: 30%; }
        .c-sao, .c-cua { font-size: 14px; font-weight: 700; text-align: center; width: 40%; }
        .c-so, .c-than { font-size: 13px; font-weight: 600; text-align: right; width: 30%; }
        .c-cach-cuc { font-size: 10px; font-weight: 700; color: #1565c0; text-transform: uppercase; text-align: center; line-height: 1.1; }

        .center-cell { background: #fff; justify-content: center; align-items: center; }
        .center-text { color: #888; font-size: 10px; text-align: center; font-style: italic; }

        .text-red { color: #d32f2f; }
        .text-black { color: #222; }

        /* --- CONTROL PANEL --- */
        .controls-card {
            width: 95%; max-width: 500px; background: white; border-radius: 12px; padding: 15px;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .time-display { font-size: 15px; font-weight: 700; color: #1565c0; text-align: center; margin-bottom: 12px; }
        
        .input-row { display: flex; gap: 5px; justify-content: space-between; margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-group label { font-size: 10px; color: #666; margin-bottom: 3px; text-align: center; font-weight: 600; }
        .input-field { width: 100%; height: 36px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 15px; font-weight: 700; background: #fdfdfd; }
        .input-group.year { flex: 1.2; }
        
        .btn-update { width: 100%; padding: 12px; background: #ef5323; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-update:active { transform: scale(0.98); }
        
        /* --- LUẬN GIẢI 8 HƯỚNG CHI TIẾT --- */
        .interpretation-card {
            width: 95%; max-width: 500px; background: white; border-radius: 12px; padding: 15px;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .inter-title { font-size: 18px; font-weight: 800; color: #333; text-align: center; text-transform: uppercase; margin-top: 5px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;}
        
        .dir-item { margin-bottom: 15px; border-radius: 10px; border: 1px solid #eee; overflow: hidden; }
        .dir-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: white;}
        
        .rank-daicat { background: #2e7d32; }
        .rank-tieucat { background: #43a047; }
        .rank-binhhoa { background: #f57c00; }
        .rank-tieuhung { background: #e53935; }
        .rank-daihung { background: #b71c1c; }

        .dh-title { font-size: 15px; font-weight: 800; }
        .dh-rank { font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 12px; }
        
        .dir-body { padding: 12px 15px; background: #fafafa; }
        
        .detail-row { margin-bottom: 8px; font-size: 13px; line-height: 1.4; display: flex; }
        .detail-label { font-weight: 700; width: 60px; flex-shrink: 0; color: #555;}
        .detail-text { flex: 1; color: #222;}
        
        .action-box { margin-top: 10px; display: flex; gap: 10px; }
        .action-col { flex: 1; background: #fff; border-radius: 6px; padding: 8px; border: 1px solid #eaeaea; }
        .act-title { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .act-title.good { color: #2e7d32; }
        .act-title.bad { color: #d32f2f; }
        .act-content { font-size: 12px; color: #444; margin: 0; padding-left: 15px; }
        .act-content li { margin-bottom: 3px; }

    </style>
</head>

    <script>
        // --- 1. DỮ LIỆU TỪ ĐIỂN KỲ MÔN ---
        const CAN = ["Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ", "Canh", "Tân", "Nhâm", "Quý"];
        const CHI = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
        const LUONG_NGHI = ["Mậu", "Kỷ", "Canh", "Tân", "Nhâm", "Quý", "Đinh", "Bính", "Ất"];
        const TUAN_THU_MAP = { 0: "Mậu", 10: "Kỷ", 8: "Canh", 6: "Tân", 4: "Nhâm", 2: "Quý" };
        const GOC_SAO = { 1: "Bồng", 2: "Nhuệ", 3: "Xung", 4: "Phụ", 5: "Cầm", 6: "Tâm", 7: "Trụ", 8: "Nhậm", 9: "Anh" };
        const GOC_CUA = { 1: "Hưu", 2: "Tử", 3: "Thương", 4: "Đỗ", 5: "Tử", 6: "Khai", 7: "Kinh", 8: "Sinh", 9: "Cảnh" };
        const SAO_NAME = ["Bồng", "Nhậm", "Xung", "Phụ", "Anh", "Nhuệ", "Trụ", "Tâm"];
        const CUA_NAME = ["Hưu", "Sinh", "Thương", "Đỗ", "Cảnh", "Tử", "Kinh", "Khai"];
        const THAN_NAME = ["Phù", "Xà", "Âm", "Hợp", "Hổ", "Vũ", "Địa", "Thiên"];
        const VONG_LA_BAN = [1, 8, 3, 4, 9, 2, 7, 6]; 
        const RED_ELEMENTS = ["Ất", "Bính", "Đinh", "Mậu", "Sinh", "Cảnh", "Khai", "Hưu", "Tâm", "Anh", "Nhuệ"]; 

        const SOLAR_TERMS = ["Xuân phân", "Thanh minh", "Cốc vũ", "Lập hạ", "Tiểu mãn", "Mang chủng", "Hạ chí", "Tiểu thử", "Đại thử", "Lập thu", "Xử thử", "Bạch lộ", "Thu phân", "Hàn lộ", "Sương giáng", "Lập đông", "Tiểu tuyết", "Đại tuyết", "Đông chí", "Tiểu hàn", "Đại hàn", "Lập xuân", "Vũ thủy", "Kinh trập"];
        const TERM_CUC_DATA = [
            { type: "Dương", cuc: [3,9,6] }, { type: "Dương", cuc: [4,1,7] }, { type: "Dương", cuc: [5,2,8] },
            { type: "Dương", cuc: [4,1,7] }, { type: "Dương", cuc: [5,2,8] }, { type: "Dương", cuc: [6,3,9] },
            { type: "Âm", cuc: [9,3,6] }, { type: "Âm", cuc: [8,2,5] }, { type: "Âm", cuc: [7,1,4] },
            { type: "Âm", cuc: [2,5,8] }, { type: "Âm", cuc: [1,4,7] }, { type: "Âm", cuc: [9,3,6] },
            { type: "Âm", cuc: [7,1,4] }, { type: "Âm", cuc: [6,9,3] }, { type: "Âm", cuc: [5,8,2] },
            { type: "Âm", cuc: [6,9,3] }, { type: "Âm", cuc: [5,8,2] }, { type: "Âm", cuc: [4,7,1] },
            { type: "Dương", cuc: [1,7,4] }, { type: "Dương", cuc: [2,8,5] }, { type: "Dương", cuc: [3,9,6] },
            { type: "Dương", cuc: [8,5,2] }, { type: "Dương", cuc: [9,6,3] }, { type: "Dương", cuc: [1,7,4] }
        ];

        // TỪ ĐIỂN LUẬN GIẢI CHI TIẾT
        const DICT_MON = {
            "Sinh": { score: 3, desc: "Cửa mang năng lượng sống, vạn vật sinh sôi. Rất tốt cho kinh doanh, cầu tài lộc.", acts: ["Cầu tài lộc, đàm phán", "Ký kết hợp đồng", "Chữa bệnh, cầu con"], avoids: ["Tấn công, kiện tụng"] },
            "Khai": { score: 3, desc: "Cửa của sự hanh thông, mở rộng. Tốt cho sự nghiệp, giải quyết bế tắc.", acts: ["Nhậm chức, xin việc", "Khai trương, thi cử", "Bắt đầu dự án mới"], avoids: ["Che giấu, đi trốn"] },
            "Hưu": { score: 2, desc: "Cửa của sự bình an, nghỉ ngơi, hàn gắn. Mọi việc thong dong, có quý nhân.", acts: ["Thăm viếng quý nhân", "Giải quyết mâu thuẫn", "Nghỉ ngơi, tĩnh dưỡng"], avoids: ["Đầu tư mạo hiểm, đánh trận"] },
            "Cảnh": { score: 0, desc: "Cửa hào nhoáng, liên quan đến giấy tờ, hình ảnh. Nhìn đẹp nhưng dễ trống rỗng.", acts: ["Thi cử, nộp hồ sơ", "Truyền thông, quảng cáo", "Lên kế hoạch"], avoids: ["Đầu tư tiền bạc (dễ ảo)", "Tranh cãi (dễ hỏa hoạn)"] },
            "Đỗ": { score: 0, desc: "Cửa đóng kín, bế tắc, không thể tiến lên. Chỉ tốt cho việc ẩn nấp.", acts: ["Trốn nợ, tránh mặt", "Bảo mật thông tin", "Bắt bớ tội phạm"], avoids: ["Cầu tài, xuất hành", "Giao tiếp, kết bạn"] },
            "Thương": { score: -2, desc: "Cửa của sự va chạm, tổn thương cơ thể, hao tổn tài sản.", acts: ["Đi đòi nợ", "Đánh bắt, săn bắn"], avoids: ["Xuất hành đi xa", "Kinh doanh, giao dịch", "Phẫu thuật"] },
            "Kinh": { score: -2, desc: "Cửa của sự hoang mang, sợ hãi, dễ dính đến kiện tụng, rắc rối pháp lý.", acts: ["Mở phiên tòa", "Bắt giữ kẻ gian"], avoids: ["Làm ăn, đàm phán", "Ký kết giấy tờ"] },
            "Tử": { score: -3, desc: "Cửa xấu nhất, năng lượng cạn kiệt, bế tắc hoàn toàn.", acts: ["Săn bắn, mai táng"], avoids: ["Tuyệt đối không làm việc lớn", "Tránh khởi sự, chữa bệnh"] }
        };

        const DICT_TINH = {
            "Tâm": { score: 1, desc: "Sao mưu trí, y tế, quản lý. Có tài lãnh đạo." },
            "Bồng": { score: -1, desc: "Sao mạo hiểm, đại đạo. Tốt cho việc táo bạo, xấu cho bình ổn." },
            "Nhậm": { score: 1, desc: "Sao hiền lành, chậm rãi. Tốt cho xây dựng cơ sở lâu dài." },
            "Xung": { score: 0, desc: "Sao nhanh nhẹn, manh động. Việc cần làm nhanh thì tốt." },
            "Phụ": { score: 1, desc: "Sao văn chương, giáo dục. Tốt cho học hành, nghệ thuật." },
            "Anh": { score: 0, desc: "Sao nóng nảy, tiệc tùng. Rực rỡ nhưng chóng tàn." },
            "Nhuệ": { score: -2, desc: "Sao bệnh tật, tham lam. Xấu mọi bề, cẩn thận ốm đau." },
            "Trụ": { score: -1, desc: "Sao phá hoại, thị phi. Chỉ hợp với việc phá hủy, đập phá." }
        };

        const DICT_THAN = {
            "Phù": { score: 2, desc: "Quý nhân tối cao, hóa giải mọi tai ương." },
            "Xà": { score: -1, desc: "Lằng nhằng, biến hóa, lo âu, quái dị." },
            "Âm": { score: 1, desc: "Sự che chở bí mật, tốt cho mưu tính kín đáo." },
            "Hợp": { score: 1, desc: "Tốt cho môi giới, hôn nhân, tụ tập đông người." },
            "Hổ": { score: -1, desc: "Sát thương, tai nạn, uy dũng ác liệt." },
            "Vũ": { score: -1, desc: "Mờ ám, lừa đảo, tiểu nhân hãm hại, mất cắp." },
            "Địa": { score: 1, desc: "Vững chắc, chậm rãi, tốt cho điền sản, bất động sản." },
            "Thiên": { score: 1, desc: "Chủ động, oai phong, đi xa, xuất hành tốt." }
        };

        function getFormation(thienCan, diaCan, cung) {
            let res = { name: "", type: 0, desc: "" }; // type: 1 (Cát), -1 (Hung)
            let thienDia = thienCan + diaCan;
            
            // Cát Cách
            if(thienDia === "MậuBính") return { name: "Thanh Long Phản Thủ", type: 2, desc: "Cực tốt, vạn sự thuận lợi, lợi ích nhân đôi." };
            if(thienDia === "BínhMậu") return { name: "Phi Điểu Điệt Huyệt", type: 2, desc: "Việc tốt tự nhiên đến, dễ dàng thành công." };
            if(thienDia === "ẤtBính") return { name: "Kỳ Nghi Thuận Toại", type: 1, desc: "Sao tốt chiếu mệnh, mọi việc hanh thông." };
            
            // Hung Cách
            if(thienDia === "CanhCanh") return { name: "Thái Bạch Đồng Cung", type: -2, desc: "Xung đột kịch liệt, tai họa bất ngờ." };
            if(thienDia === "TânẤt") return { name: "Bạch Hổ Xương Cuồng", type: -2, desc: "Hao tài, tai nạn, tuyệt đối tránh xuất hành." };
            if(thienDia === "ĐinhQuý" || thienDia === "QuýĐinh") return { name: "Chu Tước / Đằng Xà", type: -1, desc: "Kiện tụng, khẩu thiệt, lừa dối." };
            if(["CanhKỷ", "KỷCanh"].includes(thienDia)) return { name: "Hình Cách", type: -1, desc: "Thị phi, tranh chấp, dễ bị thương." };
            
            if(thienCan === "Mậu" && cung === 3) return { name: "Lục Nghi Kịch Hình", type: -2, desc: "Hình phạt nặng nề, tai họa không báo trước." };
            if(thienCan === "Kỷ" && cung === 2) return { name: "Lục Nghi Kịch Hình", type: -2, desc: "Hình phạt nặng nề, tai họa không báo trước." };
            if(thienCan === "Canh" && cung === 8) return { name: "Lục Nghi Kịch Hình", type: -2, desc: "Hình phạt nặng nề, tai họa không báo trước." };
            
            if(thienCan === "Canh") return { name: "Thái Bạch Cách", type: -1, desc: "Cản trở, khó khăn mọi bề." };
            
            return res;
        }

        // --- 2. THUẬT TOÁN KỲ MÔN ---
        function INT(d) { return Math.floor(d); }
        function jdFromDate(dd, mm, yy) {
            var a = INT((14 - mm) / 12); var y = yy + 4800 - a; var m = mm + 12 * a - 3;
            var jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - INT(y / 100) + INT(y / 400) - 32045;
            if (jd < 2299161) jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - 32083;
            return jd;
        }
        function toRadians(deg) { return deg * Math.PI / 180; }
        function calcSolarLongitude(date) {
            var JD = (date.getTime() / 86400000.0) + 2440587.5; var T = (JD - 2451545.0) / 36525;
            var L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T * T;
            var M = 357.52910 + 35999.05030 * T - 0.0001559 * T * T - 0.00000048 * T * T * T;
            var C = (1.914600 - 0.004817 * T - 0.000014 * T * T) * Math.sin(toRadians(M)) + (0.01993 - 0.000101 * T) * Math.sin(toRadians(2 * M)) + 0.000290 * Math.sin(toRadians(3 * M));
            var theta = L0 + C; var lambda = (theta - 0.00569 - 0.00478 * Math.sin(toRadians(125.04 - 1934.136 * T))) % 360;
            if (lambda < 0) lambda += 360; return lambda;
        }

        function getCanChiIndices(date) {
            let currentYear = date.getFullYear(); let guessDate = new Date(currentYear, 1, 4);
            let start = guessDate.getTime() - 2 * 86400000; let end = guessDate.getTime() + 2 * 86400000;
            for (let i = 0; i < 20; i++) {
                let mid = (start + end) / 2; let l = calcSolarLongitude(new Date(mid)); let delta = l - 315;
                while (delta <= -180) delta += 360; while (delta > 180) delta -= 360;
                if (delta < 0) start = mid; else end = mid;
            }
            let lapXuanDate = new Date(end);
            let solarYear = date.getTime() >= lapXuanDate.getTime() ? currentYear : currentYear - 1;
            let canNamIdx = (solarYear + 6) % 10; let chiNamIdx = (solarYear + 8) % 12;

            let lambda = calcSolarLongitude(date);
            let monthBranchIdx = Math.floor(((lambda + 45) % 360) / 30) + 2; if (monthBranchIdx >= 12) monthBranchIdx -= 12;
            let startStem = (canNamIdx % 5) * 2 + 2; let diff = monthBranchIdx - 2; if (diff < 0) diff += 12;
            let canThangIdx = (startStem + diff) % 10;

            let dd = date.getDate(), mm = date.getMonth() + 1, yy = date.getFullYear();
            let jd = jdFromDate(dd, mm, yy);
            let canNgayIdx = (jd + 9) % 10; let chiNgayIdx = (jd + 1) % 12;

            let hh = date.getHours(); let chiGioIdx = Math.floor(((hh + 1) % 24) / 2) % 12;
            let canGioIdx = ((canNgayIdx % 5) * 2 + chiGioIdx) % 10;

            return { h: [canGioIdx, chiGioIdx], d: [canNgayIdx, chiNgayIdx] };
        }

        let currentQimenData = {}; 

        function calculateQimen(date) {
            let indices = getCanChiIndices(date);
            let lambda = calcSolarLongitude(date);
            let termIdx = Math.floor(lambda / 15);
            let termData = TERM_CUC_DATA[termIdx];
            let isYang = termData.type === "Dương";

            let phuDauChi = (indices.d[1] - (indices.d[0] % 5) + 12) % 12;
            let nguyenIdx = [0,3,6,9].includes(phuDauChi) ? 0 : ([2,5,8,11].includes(phuDauChi) ? 1 : 2);
            let currentCuc = termData.cuc[nguyenIdx];

            let diaBan = {};
            for (let i = 0; i < 9; i++) {
                let current = (isYang ? currentCuc + i : currentCuc - i);
                while (current <= 0) current += 9; while (current > 9) current -= 9;
                diaBan[current] = LUONG_NGHI[i];
            }

            let hourCanIdx = indices.h[0]; let hourChiIdx = indices.h[1];
            let tuanThuChiIdx = (hourChiIdx - hourCanIdx + 12) % 12;
            let tuanThuStem = TUAN_THU_MAP[tuanThuChiIdx];

            let rootPalace = parseInt(Object.keys(diaBan).find(k => diaBan[k] === tuanThuStem));
            let actualRootForStar = rootPalace === 5 ? 2 : rootPalace;
            let trucTinh = GOC_SAO[actualRootForStar];
            let trucSu = GOC_CUA[rootPalace];

            let targetPalace = hourCanIdx === 0 ? actualRootForStar : parseInt(Object.keys(diaBan).find(k => diaBan[k] === CAN[hourCanIdx]));
            if (targetPalace === 5) targetPalace = 2;

            let saoIdx = SAO_NAME.indexOf(trucTinh);
            let targetVongIdx = VONG_LA_BAN.indexOf(targetPalace);
            let thienBanSao = {};
            for (let i = 0; i < 8; i++) thienBanSao[VONG_LA_BAN[(targetVongIdx + i) % 8]] = SAO_NAME[(saoIdx + i) % 8];

            let thienBanCan = {};
            for (let i = 1; i <= 9; i++) {
                if (i === 5) continue;
                let originalPalace = parseInt(Object.keys(GOC_SAO).find(k => GOC_SAO[k] === thienBanSao[i]));
                if (thienBanSao[i] === "Nhuệ") originalPalace = 2;
                thienBanCan[i] = diaBan[originalPalace];
            }

            let currentDoorPalace = rootPalace;
            for (let i = 0; i < hourCanIdx; i++) {
                if (isYang) { currentDoorPalace++; if (currentDoorPalace > 9) currentDoorPalace = 1; } 
                else { currentDoorPalace--; if (currentDoorPalace < 1) currentDoorPalace = 9; }
            }
            if (currentDoorPalace === 5) currentDoorPalace = 2;

            let cuaIdx = CUA_NAME.indexOf(trucSu);
            let targetCuaVongIdx = VONG_LA_BAN.indexOf(currentDoorPalace);
            let nhanBanCua = {};
            for (let i = 0; i < 8; i++) nhanBanCua[VONG_LA_BAN[(targetCuaVongIdx + i) % 8]] = CUA_NAME[(cuaIdx + i) % 8];

            let thanVongIdx = VONG_LA_BAN.indexOf(targetPalace);
            let thanBan = {};
            for (let i = 0; i < 8; i++) {
                let pIdx = isYang ? (thanVongIdx + i) % 8 : (thanVongIdx - i + 8) % 8;
                thanBan[VONG_LA_BAN[pIdx]] = THAN_NAME[i];
            }

            currentQimenData = {
                type: termData.type, cuc: currentCuc, tuan: `Giáp ${CHI[tuanThuChiIdx]}`, tinh: trucTinh, su: trucSu,
                diaBan, thienBanCan, thienBanSao, nhanBanCua, thanBan
            };

            renderBoard();
            renderInterpretations();
        }

        // --- 3. RENDER BÀN CỜ ---
        function getColor(str) { return RED_ELEMENTS.includes(str) ? "text-red" : "text-black"; }
        
        function renderBoard() {
            document.getElementById('txtDon').innerText = `${currentQimenData.type} Độn`;
            document.getElementById('txtCuc').innerText = currentQimenData.cuc;
            document.getElementById('txtTuan').innerText = currentQimenData.tuan;
            document.getElementById('txtTinh').innerText = currentQimenData.tinh;
            document.getElementById('txtSu').innerText = currentQimenData.su;

            const board = document.getElementById("qimenBoard");
            board.innerHTML = "";
            const RENDER_ORDER = [4, 9, 2, 3, 5, 7, 8, 1, 6];

            let d = currentQimenData;
            let nhuePalace = parseInt(Object.keys(d.thienBanSao).find(k => d.thienBanSao[k] === "Nhuệ"));

            RENDER_ORDER.forEach(cung => {
                let div = document.createElement("div");
                div.className = "qimen-cell" + (cung === 5 ? " center-cell" : "");
                
                if (cung === 5) {
                    div.innerHTML = `<span class="center-text">Phông Thủy<br>Kỳ Môn<br>Trung Cung</span>`;
                } else {
                    let tbCan = d.thienBanCan[cung];
                    if (cung === nhuePalace) tbCan = `${d.diaBan[5]}/${tbCan}`;
                    let cachCuc = getFormation(d.thienBanCan[cung], d.diaBan[cung], cung);
                    
                    div.innerHTML = `
                        <div class="row-top">
                            <span class="c-can ${getColor(tbCan.split('/').pop())}">${tbCan}</span>
                            <span class="c-sao ${getColor(d.thienBanSao[cung])}">${d.thienBanSao[cung]}</span>
                            <span class="c-so text-red">${cung}</span>
                        </div>
                        <div class="row-mid"><span class="c-cach-cuc">${cachCuc.name}</span></div>
                        <div class="row-bot">
                            <span class="c-can ${getColor(d.diaBan[cung])}">${d.diaBan[cung]}</span>
                            <span class="c-cua ${getColor(d.nhanBanCua[cung])}">${d.nhanBanCua[cung]}</span>
                            <span class="c-than ${getColor(d.thanBan[cung])}">${d.thanBan[cung]}</span>
                        </div>
                    `;
                }
                board.appendChild(div);
            });
        }

        // --- 4. ENGINE LUẬN GIẢI CHUYÊN SÂU ---
        const DIR_NAME = { 1: "BẮC", 2: "TÂY NAM", 3: "ĐÔNG", 4: "ĐÔNG NAM", 6: "TÂY BẮC", 7: "TÂY", 8: "ĐÔNG BẮC", 9: "NAM" };
        
        function renderInterpretations() {
            const container = document.getElementById("interpretationList");
            container.innerHTML = "";
            let d = currentQimenData;
            let sortedCung = [1,8,3,4,9,2,7,6]; 

            sortedCung.forEach(cung => {
                let cuaStr = d.nhanBanCua[cung];
                let saoStr = d.thienBanSao[cung];
                let thanStr = d.thanBan[cung];
                let cach = getFormation(d.thienBanCan[cung], d.diaBan[cung], cung);
                
                let cuaData = DICT_MON[cuaStr];
                let saoData = DICT_TINH[saoStr];
                let thanData = DICT_THAN[thanStr];

                // Chấm điểm tổng
                let totalScore = cuaData.score + saoData.score + thanData.score + cach.type;
                
                let rankClass, rankText;
                if (totalScore >= 4) { rankClass = "rank-daicat"; rankText = "ĐẠI CÁT"; }
                else if (totalScore >= 1) { rankClass = "rank-tieucat"; rankText = "TIỂU CÁT"; }
                else if (totalScore === 0) { rankClass = "rank-binhhoa"; rankText = "BÌNH HÒA"; }
                else if (totalScore >= -2) { rankClass = "rank-tieuhung"; rankText = "TIỂU HUNG"; }
                else { rankClass = "rank-daihung"; rankText = "ĐẠI HUNG"; }

                // Sinh HTML
                let actsHTML = cuaData.acts.map(a => `<li>${a}</li>`).join("");
                let avoidsHTML = cuaData.avoids.map(a => `<li>${a}</li>`).join("");

                let html = `
                    <div class="dir-item">
                        <div class="dir-header ${rankClass}">
                            <div class="dh-title">Hướng ${DIR_NAME[cung]}</div>
                            <div class="dh-rank">${rankText} (Điểm: ${totalScore})</div>
                        </div>
                        <div class="dir-body">
                            <div class="detail-row"><div class="detail-label">Nhân:</div><div class="detail-text"><b>${cuaStr} Môn</b> - ${cuaData.desc}</div></div>
                            <div class="detail-row"><div class="detail-label">Thiên:</div><div class="detail-text"><b>Thiên ${saoStr}</b> - ${saoData.desc}</div></div>
                            <div class="detail-row"><div class="detail-label">Thần:</div><div class="detail-text"><b>${thanStr}</b> - ${thanData.desc}</div></div>
                            ${cach.name ? `<div class="detail-row"><div class="detail-label">Cách:</div><div class="detail-text" style="color:#1565c0;"><b>${cach.name}</b> - ${cach.desc}</div></div>` : ""}
                            
                            <div class="action-box">
                                <div class="action-col">
                                    <div class="act-title good">✓ NÊN LÀM</div>
                                    <ul class="act-content">${actsHTML}</ul>
                                </div>
                                <div class="action-col">
                                    <div class="act-title bad">✗ TRÁNH LÀM</div>
                                    <ul class="act-content">${avoidsHTML}</ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // --- 5. INITIALIZATION ---
        function initTime() {
            let now = new Date();
            document.getElementById('inpDay').value = now.getDate();
            document.getElementById('inpMonth').value = now.getMonth() + 1;
            document.getElementById('inpYear').value = now.getFullYear();
            document.getElementById('inpHour').value = now.getHours();
            document.getElementById('inpMin').value = now.getMinutes();
            updateFromManual();
        }

        function updateFromManual() {
            let d = parseInt(document.getElementById('inpDay').value);
            let m = parseInt(document.getElementById('inpMonth').value);
            let y = parseInt(document.getElementById('inpYear').value);
            let h = parseInt(document.getElementById('inpHour').value);
            let min = parseInt(document.getElementById('inpMin').value);
            
            let targetDate = new Date(y, m - 1, d, h, min, 0);
            document.getElementById('displayTime').innerText = `Lá số ngày: ${d}/${m}/${y} - ${h}:${min < 10 ? '0'+min : min}`;
            calculateQimen(targetDate);
        }

        initTime();

    </script>
</body>
</html>
